<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" role="img" aria-labelledby="title desc">
  <title id="title">icm doctor terminal screenshot</title>
  <desc id="desc">Terminal output showing doctor diagnostics and fix guidance.</desc>
  <rect width="960" height="580" fill="#f5f7fa"/>
  <rect x="44" y="44" width="872" height="492" fill="#151719" stroke="#2f363d" stroke-width="2"/>
  <rect x="44" y="44" width="872" height="42" fill="#22272c"/>
  <circle cx="70" cy="65" r="7" fill="#d94841"/>
  <circle cx="94" cy="65" r="7" fill="#d9a441"/>
  <circle cx="118" cy="65" r="7" fill="#3fb37f"/>
  <text x="146" y="70" fill="#dce3e8" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16">terminal</text>
  <text x="72" y="126" fill="#94d7ca" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">$ icm doctor</text>
  <text x="72" y="174" fill="#f1f5f4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">ICM doctor: /projects/my-first-icm-workspace</text>
  <text x="72" y="226" fill="#3fb37f" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">Structure: OK</text>
  <text x="72" y="278" fill="#d9a441" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">Content checks: needs attention</text>
  <text x="72" y="326" fill="#f1f5f4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="19">WARN Project brief needs required sections before downstream stages run</text>
  <text x="72" y="366" fill="#d7dee4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="19">     Fix: Fill Desired Outcome, Audience Or Users, and Success Criteria.</text>
  <text x="72" y="426" fill="#d7dee4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="19">Stage summary:</text>
  <text x="72" y="466" fill="#d7dee4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="19">- 00_intake: needs_input</text>
  <text x="72" y="506" fill="#d7dee4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="19">Likely next action: fill project-brief.md</text>
