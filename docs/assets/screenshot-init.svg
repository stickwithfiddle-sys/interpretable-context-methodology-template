<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" role="img" aria-labelledby="title desc">
  <title id="title">icm init terminal screenshot</title>
  <desc id="desc">Terminal output showing ICM initialized in an existing project.</desc>
  <rect width="960" height="580" fill="#f5f7fa"/>
  <rect x="44" y="44" width="872" height="492" fill="#151719" stroke="#2f363d" stroke-width="2"/>
  <rect x="44" y="44" width="872" height="42" fill="#22272c"/>
  <circle cx="70" cy="65" r="7" fill="#d94841"/>
  <circle cx="94" cy="65" r="7" fill="#d9a441"/>
  <circle cx="118" cy="65" r="7" fill="#3fb37f"/>
  <text x="146" y="70" fill="#dce3e8" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="16">terminal</text>
  <text x="72" y="128" fill="#94d7ca" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">$ icm init . --name "Existing Docs Project"</text>
  <text x="72" y="176" fill="#f1f5f4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">Initialized ICM workspace: /projects/existing-docs-project</text>
  <text x="72" y="212" fill="#f1f5f4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">Project name: Existing Docs Project</text>
  <text x="72" y="258" fill="#d7dee4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">Created files: 39</text>
  <text x="72" y="294" fill="#d7dee4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">Skipped existing files: 1</text>
  <text x="96" y="334" fill="#d7dee4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">- README.md</text>
  <text x="72" y="396" fill="#d7dee4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">Next steps:</text>
  <text x="96" y="436" fill="#d7dee4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">1. Run icm doctor</text>
  <text x="96" y="476" fill="#d7dee4" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="20">2. Fill stages/00_intake/output/project-brief.md</text>
</svg>
