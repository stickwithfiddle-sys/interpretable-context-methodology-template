name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Check packaged assets
        run: python tools/check_packaged_assets.py

      - name: Check docs site
        run: python tools/check_docs_site.py

      - name: Check release readiness
        run: python tools/check_release_readiness.py

      - name: Run pytest suite
        run: python -m pytest

      - name: Validate template
        run: icm validate templates/icm-workspace --strict

      - name: Validate content-plan example
        run: icm validate examples/completed-content-plan --strict

      - name: Validate research-brief example
        run: icm validate examples/completed-research-brief --strict

      - name: Validate documentation-refresh example
        run: icm validate examples/completed-documentation-refresh --strict

      - name: Validate project-plan example
        run: icm validate examples/completed-project-plan --strict

      - name: Smoke test CLI status
        run: icm status examples/completed-content-plan

      - name: Smoke test CLI status JSON
        run: icm status examples/completed-content-plan --json

      - name: Smoke test CLI next
        run: icm next examples/completed-content-plan

      - name: Smoke test CLI explain
        run: icm explain stages/01_discovery --workspace examples/completed-content-plan

      - name: Smoke test CLI review
        run: icm review stages/01_discovery --workspace examples/completed-content-plan

      - name: Smoke test CLI review JSON
        run: icm review stages/01_discovery --workspace examples/completed-content-plan --json

      - name: Smoke test research rubric review
        run: icm review stages/01_discovery --workspace examples/completed-research-brief

      - name: Smoke test documentation validator review
        run: icm review stages/01_discovery --workspace examples/completed-documentation-refresh

      - name: Smoke test documentation artifact-shape review
        run: icm review stages/05_validation --workspace examples/completed-documentation-refresh

      - name: Smoke test project-plan discovery review
        run: icm review stages/01_discovery --workspace examples/completed-project-plan

      - name: Smoke test project-plan artifact-shape review
        run: icm review stages/05_validation --workspace examples/completed-project-plan

      - name: Smoke test CLI doctor
        run: icm doctor examples/completed-content-plan --strict

      - name: Smoke test CLI doctor JSON
        run: icm doctor examples/completed-content-plan --json

      - name: Smoke test research doctor
        run: icm doctor examples/completed-research-brief --strict

      - name: Smoke test documentation doctor
        run: icm doctor examples/completed-documentation-refresh --strict

      - name: Smoke test project-plan doctor
        run: icm doctor examples/completed-project-plan --strict

      - name: Run legacy validators
        run: |
          python tools/validate_icm_workspace.py templates/icm-workspace --strict
          python examples/completed-content-plan/tools/validate_icm_workspace.py examples/completed-content-plan --strict
          python examples/completed-research-brief/tools/validate_icm_workspace.py examples/completed-research-brief --strict
          python examples/completed-documentation-refresh/tools/validate_icm_workspace.py examples/completed-documentation-refresh --strict
          python examples/completed-project-plan/tools/validate_icm_workspace.py examples/completed-project-plan --strict

      - name: Build package distributions
        run: |
          rm -rf dist build *.egg-info
          python -m build

      - name: Check package rendering
        run: python -m twine check dist/*

      - name: Install wheel into clean venv
        run: |
          python -m venv /tmp/icm-wheel-venv
          /tmp/icm-wheel-venv/bin/python -m pip install dist/*.whl

      - name: Smoke test installed wheel outside checkout
        working-directory: /tmp
        run: |
          rm -rf icm-install-smoke
          /tmp/icm-wheel-venv/bin/icm --version
          /tmp/icm-wheel-venv/bin/icm new icm-install-smoke --name "Install Smoke"
          /tmp/icm-wheel-venv/bin/icm init icm-install-smoke --name "Install Smoke" --with-common-artifacts
          /tmp/icm-wheel-venv/bin/icm validate icm-install-smoke --strict
          /tmp/icm-wheel-venv/bin/icm status icm-install-smoke
          /tmp/icm-wheel-venv/bin/icm status icm-install-smoke --json
          test -f icm-install-smoke/.gitignore
          test -f icm-install-smoke/.github/prompts/run-icm-stage.prompt.md
          test -f icm-install-smoke/shared/source-inventory.md
          test -f icm-install-smoke/shared/release-calendar.md
          test -f icm-install-smoke/stages/01_discovery/output/.gitkeep
          python icm-install-smoke/tools/validate_icm_workspace.py icm-install-smoke --strict
