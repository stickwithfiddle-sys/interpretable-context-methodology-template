name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Check packaged assets
        run: python tools/check_packaged_assets.py

      - name: Check docs site
        run: python tools/check_docs_site.py

      - name: Check release readiness
        run: python tools/check_release_readiness.py

      - name: Run pytest suite
        run: python -m pytest

      - name: Validate template
        run: icm validate templates/icm-workspace --strict

      - name: Validate content-plan example
        run: icm validate examples/completed-content-plan --strict

      - name: Validate research-brief example
        run: icm validate examples/completed-research-brief --strict

      - name: Smoke test CLI status
        run: icm status examples/completed-content-plan

      - name: Smoke test CLI next
        run: icm next examples/completed-content-plan

      - name: Smoke test CLI explain
        run: icm explain stages/01_discovery --workspace examples/completed-content-plan

      - name: Smoke test CLI review
        run: icm review stages/01_discovery --workspace examples/completed-content-plan

      - name: Smoke test research rubric review
        run: icm review stages/01_discovery --workspace examples/completed-research-brief

      - name: Smoke test CLI doctor
        run: icm doctor examples/completed-content-plan --strict

      - name: Smoke test research doctor
        run: icm doctor examples/completed-research-brief --strict

      - name: Build package distributions
        run: |
          rm -rf dist build *.egg-info
          python -m build

      - name: Check package rendering
        run: python -m twine check dist/*

      - name: Install wheel into clean venv
        run: |
          python -m venv /tmp/icm-wheel-venv
          /tmp/icm-wheel-venv/bin/python -m pip install dist/*.whl

      - name: Smoke test installed wheel outside checkout
        working-directory: /tmp
        run: |
          rm -rf icm-install-smoke
          /tmp/icm-wheel-venv/bin/icm --version
          /tmp/icm-wheel-venv/bin/icm new icm-install-smoke --name "Install Smoke"
          /tmp/icm-wheel-venv/bin/icm init icm-install-smoke --name "Install Smoke"
          /tmp/icm-wheel-venv/bin/icm validate icm-install-smoke --strict
          /tmp/icm-wheel-venv/bin/icm status icm-install-smoke
          test -f icm-install-smoke/.gitignore
          test -f icm-install-smoke/.github/prompts/run-icm-stage.prompt.md
          test -f icm-install-smoke/stages/01_discovery/output/.gitkeep
          python icm-install-smoke/tools/validate_icm_workspace.py icm-install-smoke --strict
