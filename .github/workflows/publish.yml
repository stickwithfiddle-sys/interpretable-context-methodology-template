name: Publish Python Package

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Package index to publish to"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Require a release tag
        run: |
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "Publish workflow must be run from a version tag, for example v0.16.0."
            exit 1
          fi

      - name: Check out repository
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install ".[dev]"

      - name: Check release readiness
        run: python tools/check_release_readiness.py

      - name: Build distributions
        run: python -m build

      - name: Check package rendering
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  publish-testpypi:
    name: Publish to TestPyPI
    if: github.event.inputs.repository == 'testpypi'
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    if: github.event.inputs.repository == 'pypi'
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-distributions
          path: dist

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
